<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filhos do Olimpo | Cadastro</title>
  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="./css/estilo.css">
  <link rel="stylesheet" href="./css/login.css">
  <link rel="stylesheet" href="./css/cadastro.css">
  <link rel="icon" href="./assets/icon/st_small_507x507-pad_600x600_f8f8f8.u1.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="header transparente">
    <div class="container">
      <h1 class="titulo">
        <a href="./index.html" class="inicial">
          Filhos do Olimpo
          <span class="bolt">
          </span>
        </a>
      </h1>
      <i class="fa-solid fa-bolt"></i>
    </div>
  </div>
  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>
          <a href="./index.html"><i class="bi bi-arrow-left"></i></a>
          Cadastre-se
        </h2>
        <div class="formulario">
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="deuses">
            <span>Filho de qual Divindade?</span>
            <br>
            <select id="sel_deuses">
              <option value='1'>Poseidon 🔱</option>
              <option value='2'>Hades 💀</option>
              <option value='3'>Zeus⚡</option>
            </select>
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
          <div class="nova">
            <br>
            Já possui conta?
            <a href="./login.html">Fazer Login</a>
          </div>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>
</body>

</html>
<script>
  function cadastrar() {
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var deusesVar = sel_deuses.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var deusesVincular
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Preencha todos os campos!)";
      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    let num = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
    let especiais = ['!', '@', '#', '$', '%', '&', '*']

    if (nomeVar.length <= 1) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Nome deve conter mais que 1 caracter)";
      finalizarAguardar();
    } else if (nomeVar.length >= 2) {
      
      // for (let i = 0; i < num.length; i++) {
     
      //   if (isNaN(lista[i]))

      // }
      
      for (let o = 0; o < num.length; o++) {
        if (nomeVar.includes(num[o])) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "(Nome não deve conter números)";
          finalizarAguardar();
          break
        }
      }
      for (let e = 0; e < especiais.length; e++) {
        if (nomeVar.includes(especiais[e])) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "(Nome não deve conter caractéres especiais)";
          finalizarAguardar();
          break
        }
      }
    }
    for (let i = 0; i < 1; i++) {
      if (!(emailVar.includes('@') && emailVar.includes('.'))) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(E-Mail deve conter '@' e '.')";
        finalizarAguardar();

      }
    }
    for (let i = 0; i < 1; i++) {
      if (senhaVar.length <= 6) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Senha deve conter mais do que 6 caracteres)";
        finalizarAguardar();

      }
    }
    for (let i = 0; i < 1; i++) {
      if (confirmacaoSenhaVar != senhaVar) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(As senhas devem coincidir)";
        finalizarAguardar();

      }
    }
    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nome: nomeVar,
        email: emailVar,
        fk_deuses: Number(deusesVar),
        senha: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "./login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }
  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
