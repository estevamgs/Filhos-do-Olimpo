<script>
    window.onload = function () {
    let nomeUsuario = sessionStorage.NOME_USUARIO;

    loginBtn.innerHTML = "Sair";

    loginBtn.onclick = function(){
    sessionStorage.clear();
    window.location = "../login.html";
    };


    if(deusUsuario === 1){
      document.body.classList.add("poseidon");
    } else if(deusUsuario === 2){
      document.body.classList.add("hades");
    } else if(deusUsuario === 3){
      document.body.classList.add("zeus");
    }
      carregarDadosDeus(deusUsuario);
    };
