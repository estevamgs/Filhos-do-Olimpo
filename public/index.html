<script>
  window.onload = function(){
  let nomeUsuario = sessionStorage.NOME_USUARIO;
  let deusUsuario = Number(sessionStorage.DEUS_USUARIO);

  if(nomeUsuario){
    document.getElementById("tituloUsuario").innerHTML = nomeUsuario;

    let loginBtn = document.getElementById("loginBtn");
    loginBtn.innerHTML = "Sair";
    loginBtn.href = "#";
    loginBtn.onclick = function(){
    sessionStorage.clear();
    window.location = "./login.html";
    };

    const deuses = {
      1: "Poseidon, o Deus dos Mares",
      2: "Hades, o Senhor do Submundo",
      3: "Zeus, o Deus dos Raios"
    };

    document.getElementById("fraseDeus").innerHTML = deuses[deusUsuario];
    document.getElementById("fraseContainer").style.display = "inline";

    if(deusUsuario === 1){
      document.body.classList.add("poseidon");
    } else if(deusUsuario === 2){
      document.body.classList.add("hades");
    } else if(deusUsuario === 3){
      document.body.classList.add("zeus");
    }
  } else {
    document.getElementById("fraseContainer").style.display = "none";
  }
}
</script>
